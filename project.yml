name: VitaMind
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "3.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 9L6N2ZF26B
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  VitaMind:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Sources/Resources/Assets.xcassets
      - path: Sources/LaunchScreen.storyboard
    entitlements:
      path: Sources/VitaMind.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.com.ggsheng.VitaMind
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.VitaMind
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: VitaMindWidget
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: plugins

  VitaMindWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
        type: group
    entitlements:
      path: Widget/VitaMindWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ggsheng.VitaMind
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.VitaMind.widget
        INFOPLIST_FILE: Widget/Info.plist
        ASSETCATALOG_COMPILER_WIDGET_EXTENSION_IMAGE_PLACEHOLDER: ""
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Widget/VitaMindWidget.entitlements
        DEVELOPMENT_TEAM: 9L6N2ZF26B

  VitaMindTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        type: group
        excludes:
          - "**/*.storyboard"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.VitaMind.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VitaMind.app/VitaMind"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_ENTITLEMENTS: ""
        DEVELOPMENT_TEAM: 9L6N2ZF26B
    dependencies:
      - target: VitaMind

  VitaMindUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
        type: group
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.VitaMind.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET: "$(BUILT_PRODUCTS_DIR)/VitaMind.app/VitaMind"
        CODE_SIGN_ENTITLEMENTS: ""
        DEVELOPMENT_TEAM: 9L6N2ZF26B
    dependencies:
      - target: VitaMind

schemes:
  VitaMind:
    build:
      targets:
        VitaMind: all
        VitaMindWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VitaMindTests
        - VitaMindUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release